<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Church Program Player</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#000;overflow:hidden;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif}
#app{position:fixed;inset:0;background:#000}
#player,#player iframe,#html5{position:absolute;inset:0;width:100%;height:100%;border:0}
#html5{object-fit:contain;background:#000;display:none}
#shield{position:absolute;inset:0;z-index:20;background:transparent}
#logo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#ffffff;z-index:30;opacity:0;transform:scale(.8);transition:opacity .6s ease,transform .6s ease;pointer-events:none}
#logo.show{opacity:1;transform:scale(1)}
#logo img,#logo video{max-width:78%;max-height:78%;object-fit:contain}
#logo .fallback{color:#15357a;font-size:clamp(20px,4.5vw,46px);font-weight:800;letter-spacing:1px;text-align:center;padding:0 24px;line-height:1.2}
#start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0b0b0b;z-index:50;color:#fff;text-align:center;padding:24px}
#start h1{font-size:clamp(20px,4vw,40px);margin-bottom:10px}
#start p{opacity:.65;margin-bottom:28px;font-size:clamp(13px,2vw,18px);max-width:640px}
#startBtn{font-size:clamp(18px,3vw,28px);padding:18px 46px;border:0;border-radius:999px;background:#1e7d34;color:#fff;cursor:pointer}
#startBtn:hover{background:#23973e}
#err{color:#ff6b6b;margin-top:18px;max-width:640px}
</style>
</head>
<body>
<div id="app">
<div id="player"></div>
<video id="html5" playsinline></video>
<div id="shield"></div>
<div id="logo"></div>
<div id="start">
<h1>Church Program</h1>
<p>Press start to play full-screen. Order: GHS &rarr; Choir Song &rarr; GS Message, with the church logo animated between each.</p>
<button id="startBtn">&#9654; Start Program</button>
<div id="err"></div>
</div>
</div>
<script>
(function(){
var q=new URLSearchParams(location.search);
var videoUrl=(q.get('video')||'').trim();
var logoUrl=(q.get('logo')||'').trim()||'logo.png';
var logoSec=Math.max(1,parseInt(q.get('logoSec')||'3',10)||3);
var gsRate=parseFloat(q.get('gsRate'))||1;
var revealHold=Math.max(0,parseFloat(q.get('reveal'))||3.5);
function rng(v){var a=(v||'').split('-');return{start:parseFloat(a[0])||0,end:parseFloat(a[1])||0}}
var sections=[Object.assign({name:'GHS',rate:1},rng(q.get('ghs'))),Object.assign({name:'Choir Song',rate:1},rng(q.get('choir'))),Object.assign({name:'GS Message',rate:gsRate},rng(q.get('gs')))].filter(function(s){return s.end>s.start});
var app=document.getElementById('app'),elStart=document.getElementById('start'),elErr=document.getElementById('err'),elLogo=document.getElementById('logo'),elHtml5=document.getElementById('html5');
if(/\.(mp4|webm|m4v)(\?|$)/i.test(logoUrl)){var v=document.createElement('video');v.src=logoUrl;v.autoplay=true;v.muted=true;v.loop=true;v.setAttribute('playsinline','');elLogo.appendChild(v);}
else{var img=document.createElement('img');img.src=logoUrl;img.alt='Church logo';img.onerror=function(){this.remove();var d=document.createElement('div');d.className='fallback';d.textContent='DEEPER LIFE BIBLE CHURCH';elLogo.appendChild(d);};elLogo.appendChild(img);}
if(!videoUrl){elErr.textContent='No video link provided.';return}
if(!sections.length){elErr.textContent='No valid sections - check the start/end times.';return}
function ytId(u){var m=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/|live\/|shorts\/)|youtu\.be\/)([A-Za-z0-9_-]{6,})/);return m?m[1]:null}
var YTID=ytId(videoUrl),isHls=/\.m3u8(\?|$)/i.test(videoUrl);
var idx=0,phase='idle',paused=false,holdUntil=0,seekAt=0,ytState=-1;var engine={ready:false};
function showLogo(on,instant){if(instant){elLogo.style.transition='none';elLogo.classList.toggle('show',on);void elLogo.offsetWidth;elLogo.style.transition='';}else{elLogo.classList.toggle('show',on)}}
function beginSection(i){idx=i;phase='seeking';seekAt=Date.now();showLogo(true);engine.seekPlay(sections[i].start);engine.setRate&&engine.setRate(sections[i].rate||1)}
function toLogo(){phase='logo';engine.mute&&engine.mute();showLogo(true);setTimeout(function(){if(idx+1<sections.length){beginSection(idx+1)}else{phase='done'}},logoSec*1000)}
function tick(){
if(phase==='idle'||phase==='logo'||phase==='done')return;
var s=sections[idx];if(!s)return;var t=engine.time();
if(phase==='seeking'){if((engine.playing&&engine.playing()&&t>=s.start-0.5&&t<s.end)||(Date.now()-seekAt>8000)){phase='holding';holdUntil=Date.now()+revealHold*1000;}return;}
if(phase==='holding'){if(t>=s.end-0.25){toLogo();return;}if(Date.now()>=holdUntil){phase='playing';showLogo(false);engine.unmute&&engine.unmute();engine.setRate&&engine.setRate(s.rate||1);}return;}
if(phase==='playing'){if(t>=s.end-0.25){toLogo()}}
}
function initYouTube(){var p=null;var tag=document.createElement('script');tag.src='https://www.youtube.com/iframe_api';document.head.appendChild(tag);window.onYouTubeIframeAPIReady=function(){p=new YT.Player('player',{videoId:YTID,playerVars:{controls:0,rel:0,modestbranding:1,fs:1,disablekb:1,playsinline:1,iv_load_policy:3,autoplay:0},events:{onReady:function(){engine.ready=true},onStateChange:function(e){ytState=e.data},onError:function(){elErr.textContent='This video cannot be embedded/played. Use your own (unlisted) upload or a direct video link.';elStart.style.display='flex';showLogo(false)}}})};engine.seekPlay=function(s){if(p){p.seekTo(s,true);p.playVideo()}};engine.pause=function(){if(p)p.pauseVideo()};engine.resume=function(){if(p)p.playVideo()};engine.time=function(){return p&&p.getCurrentTime?p.getCurrentTime():0};engine.playing=function(){return ytState===1};engine.unmute=function(){if(p){p.unMute();p.setVolume(100)}};engine.mute=function(){if(p)p.mute()};engine.kick=function(){if(p)p.playVideo()};engine.setRate=function(r){if(p&&p.setPlaybackRate){try{p.setPlaybackRate(r)}catch(e){}}}}
function initHtml5(){document.getElementById('player').style.display='none';elHtml5.style.display='block';elHtml5.preload='auto';if(isHls&&!elHtml5.canPlayType('application/vnd.apple.mpegurl')){var h=document.createElement('script');h.src='https://cdn.jsdelivr.net/npm/hls.js@1';h.onload=function(){var hls=new Hls();hls.loadSource(videoUrl);hls.attachMedia(elHtml5);hls.on(Hls.Events.MANIFEST_PARSED,function(){engine.ready=true})};document.head.appendChild(h)}else{elHtml5.src=videoUrl;elHtml5.addEventListener('loadedmetadata',function(){engine.ready=true});elHtml5.load()}engine.seekPlay=function(s){try{elHtml5.currentTime=s}catch(e){}var pr=elHtml5.play();if(pr&&pr.catch)pr.catch(function(){})};engine.pause=function(){elHtml5.pause()};engine.resume=function(){elHtml5.play()};engine.time=function(){return elHtml5.currentTime||0};engine.playing=function(){return !elHtml5.paused&&elHtml5.readyState>=3};engine.unmute=function(){elHtml5.muted=false;elHtml5.volume=1};engine.mute=function(){elHtml5.muted=true};engine.kick=function(){var pr=elHtml5.play();if(pr&&pr.catch)pr.catch(function(){})};engine.setRate=function(r){try{elHtml5.playbackRate=r}catch(e){}}}
if(YTID)initYouTube();else initHtml5();setInterval(tick,200);
function startProgram(){showLogo(true,true);elStart.style.display='none';var fs=app.requestFullscreen||app.webkitRequestFullscreen||app.msRequestFullscreen;if(fs){try{fs.call(app)}catch(e){}}engine.unmute&&engine.unmute();engine.kick&&engine.kick();var tries=0;(function go(){if(engine.ready){beginSection(0)}else if(tries++<80){setTimeout(go,150)}else{beginSection(0)}})()}
document.getElementById('startBtn').addEventListener('click',startProgram);
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();paused=!paused;paused?engine.pause():engine.resume()}else if(e.code==='ArrowRight'){e.preventDefault();if(phase==='playing'||phase==='seeking'||phase==='holding')toLogo()}});
})();
</script>
</body>
</html>
